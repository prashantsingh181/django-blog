{% extends "blog/base.html" %}
{% block content %}
  <div class="content-section">
    <h2>Check your email</h2>
    <p class="text-muted">
      We've emailed you a link to reset your password. If an account exists for
      the address you entered, you'll receive it shortly &mdash; be sure to check
      your spam folder if it doesn't arrive.
    </p>
    <div class="form-actions">
      <a class="btn btn-outline" href="{% url 'login' %}">Back to Login</a>
    </div>
  </div>
{% endblock content %}
