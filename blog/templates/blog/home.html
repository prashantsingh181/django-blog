{% extends "blog/base.html" %}
{% block content %}
  {% for post in posts %}
    <article class="post-card">
      <div class="post-meta">
        <a class="post-author" href="#">{{ post.author }}</a>
        <span class="post-date">{{ post.date_posted }}</span>
      </div>
      <h2 class="post-title"><a href="#">{{ post.title }}</a></h2>
      <p class="post-content">{{ post.content }}</p>
    </article>
  {% endfor %}
{% endblock %}
